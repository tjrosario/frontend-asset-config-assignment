pre-commit:
  parallel: false
  commands:
    fmt:
      glob: "*.{ts,tsx,js,jsx,json,md,css,html}"
      run: npm exec oxfmt -- {staged_files}
      stage_fixed: true
    lint:
      glob: "*.{ts,tsx,js,jsx}"
      run: npm exec oxlint -- --fix {staged_files}
      stage_fixed: true
    imports:
      glob: "*.{ts,tsx,js,jsx}"
      run: npm exec eslint -- --fix {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: npm exec commitlint -- --edit {1}

pre-push:
  parallel: false
  commands:
    typecheck:
      run: npm run typecheck
    test:
      run: npm run test:run
    coverage:
      run: npm run test:coverage
    build:
      run: npm run build
